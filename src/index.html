<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edamame Legal Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sniglet: ['"Archivo Black"', 'Archivo', 'system-ui', 'sans-serif'],
              'ibm-serif': ['Archivo', '"Helvetica Neue"', 'Helvetica', 'Arial', 'system-ui', 'sans-serif'],
              'ibm-sans': ['Archivo', '"Helvetica Neue"', 'Helvetica', 'Arial', 'system-ui', 'sans-serif'],
              sans: ['Archivo', '"Helvetica Neue"', 'Helvetica', 'Arial', 'system-ui', 'sans-serif'],
              display: ['"Archivo Black"', 'Archivo', 'system-ui', 'sans-serif'],
            },
            colors: {
              slate: {
                950: '#020617',
              },
              // Professional brand colors from the new logo
              'edamame': {
                DEFAULT: '#29B767',
                50: '#f1fcf4',
                100: '#def9e6',
                200: '#bef1cf',
                300: '#8ee4ae',
                400: '#56ce85',
                500: '#29B767', // Brand Primary Green
                600: '#2db067',
                700: '#1d814c',
                800: '#1b663f',
                900: '#175435',
                dark: '#22201D', // Brand Deep Charcoal
                sidebar: '#2DB067', // Sidebar color
              },
              'status-success': '#10B981',
              'status-warning': '#F59E0B',
              'status-danger': '#EF4444',
              'status-info': '#3B82F6',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
      /* Global brand overrides */
      .text-green-600 { color: #29B767 !important; }
      .bg-green-600 { background-color: #29B767 !important; }
      .bg-green-500 { background-color: #29B767 !important; }
      .border-green-500 { border-color: #29B767 !important; }
      .hover\:bg-green-500:hover { background-color: #2db067 !important; }
      .dark .text-green-400 { color: #56ce85 !important; }
      .bg-green-50 { background-color: #f1fcf4 !important; }
      .dark .bg-green-900\/20 { background-color: rgba(23, 84, 53, 0.2) !important; }

      /* Page layout */
      body {
        overflow-x: hidden;
        background: linear-gradient(135deg, #FFFFFF 0%, #F8FAFC 100%);
      }
      body.dark {
        background: linear-gradient(135deg, #020617 0%, #0F172A 100%);
      }

      /* Subtle grain texture */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' seed='1'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
      }

      /* Sidebar slide-in transition */
      .sidebar-drawer {
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sidebar-drawer-closed {
        transform: translateX(-100%);
      }
      .sidebar-drawer-open {
        transform: translateX(0);
      }

      /* Nav item hover fill animation */
      .nav-item-hover {
        position: relative;
        overflow: hidden;
      }
      .nav-item-hover::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.08);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.2s ease;
        border-radius: inherit;
      }
      .nav-item-hover:hover::before {
        transform: scaleX(1);
      }

      /* Card lift effect */
      .card-lift {
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .card-lift:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px -4px rgba(0,0,0,0.10), 0 4px 8px -2px rgba(0,0,0,0.06);
      }
      .dark .card-lift:hover {
        box-shadow: 0 8px 24px -4px rgba(0,0,0,0.4), 0 4px 8px -2px rgba(0,0,0,0.25);
      }

      /* Stat card shimmer on hover */
      .stat-card {
        position: relative;
        overflow: hidden;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .stat-card::after {
        content: '';
        position: absolute;
        top: 0; right: 0; bottom: 0;
        width: 3px;
        border-radius: 0 8px 8px 0;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .stat-card:hover {
        transform: translateY(-2px);
      }

      /* Task card */
      .task-card {
        transition: box-shadow 0.15s ease, border-color 0.15s ease;
      }
      .task-card:hover {
        box-shadow: 0 4px 14px -3px rgba(41, 183, 103, 0.15);
        border-color: rgba(41, 183, 103, 0.3);
      }
      .dark .task-card:hover {
        box-shadow: 0 4px 14px -3px rgba(41, 183, 103, 0.25);
        border-color: rgba(41, 183, 103, 0.35);
      }

      /* Table row hover */
      .table-row-hover {
        transition: background-color 0.12s ease;
        cursor: pointer;
      }

      /* Smooth checkbox */
      .check-btn {
        transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
      }
      .check-btn:active { transform: scale(0.9); }

      /* Modal backdrop blur */
      .modal-backdrop {
        animation: backdropFadeIn 0.18s ease forwards;
      }
      @keyframes backdropFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .modal-content {
        animation: modalSlideUp 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes modalSlideUp {
        from { opacity: 0; transform: scale(0.94) translateY(8px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      /* Progress bar fill animation */
      .progress-fill {
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Button press */
      .btn-press:active { transform: scale(0.97); }

      /* Scrollbar styling */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.12);
        border-radius: 4px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.08);
      }

      /* Page content fade in */
      .page-enter {
        animation: pageFadeIn 0.25s ease forwards;
      }
      @keyframes pageFadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Focus ring standardization */
      .focus-ring:focus-within {
        ring-color: #29B767;
        box-shadow: 0 0 0 3px rgba(41,183,103,0.18);
      }

      /* Sidebar active pill glow */
      .nav-active-glow {
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      }

      /* Mobile overlay */
      .mobile-overlay {
        animation: overlayIn 0.25s ease forwards;
      }
      @keyframes overlayIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Badge pulse for notifications */
      @keyframes badgePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
      }
      .badge-pulse { animation: badgePulse 2s ease-in-out infinite; }

      /* Divider gradient */
      .divider-gradient {
        background: linear-gradient(to right, transparent, rgba(0,0,0,0.06), transparent);
        height: 1px;
      }
      .dark .divider-gradient {
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
      }

      /* Typography: Archivo — Helvetica-family neo-grotesque */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Archivo', 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
        font-feature-settings: "ss01", "ss02", "kern";
      }

      body, p, span, li, td, th {
        font-family: 'Archivo', 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
        font-feature-settings: "kern", "liga";
      }

      /* Heading weights — tight, confident, Helvetica-style */
      h1 { font-weight: 800; letter-spacing: -0.035em; }
      h2 { font-weight: 700; letter-spacing: -0.025em; }
      h3 { font-weight: 700; letter-spacing: -0.015em; }
      h4 { font-weight: 600; letter-spacing: -0.01em; }
      h5 { font-weight: 600; letter-spacing: -0.005em; }
      h6 { font-weight: 600; letter-spacing: 0; }
    </style>

{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",

  }
}
</script>

</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
