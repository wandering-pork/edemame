name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (lint)
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Passed through for any build-time env references
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: lint-and-build
    # Only deploy on pushes to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # Override git commit author metadata so Vercel can match it to a
      # team member — uses the GitHub actor who triggered the push.
      VERCEL_GIT_COMMIT_AUTHOR_NAME: ${{ github.actor }}
      VERCEL_GIT_COMMIT_AUTHOR_LOGIN: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        # vercel deploy without --prebuilt triggers a full build on Vercel's
        # infrastructure, using the env vars set in the Vercel project dashboard.
        # VERCEL_ORG_ID + VERCEL_PROJECT_ID in env link this to the correct project.
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: src
